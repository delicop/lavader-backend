version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: lavadero
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: lavadero
      DB_USER: postgres
      DB_PASSWORD: password123
      JWT_SECRET: cambia_esto_por_algo_seguro
      JWT_EXPIRES_IN: 24h
    depends_on:
      - postgres

volumes:
  pgdata: